name: Pull Request build and test

permissions:
  contents: read

on:
  workflow_call:
  workflow_dispatch:
  merge_group:
  pull_request:
  push:
    branches:
      - main

env:
  PLUGIN_ARTIFACT_NAME: 'openfga_intellij_plugin'
  DIST_FOLDER: 'build/distributions'

jobs:
  build:
    name: Build OpenFGA plugin for IntelliJ Platform
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read Java version from gradle.properties
        run: |
          JAVA_VERSION=$(grep '^javaVersion=' gradle.properties | cut -d'=' -f2)
          if ! [[ "$JAVA_VERSION" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid Java version: $JAVA_VERSION"
            exit 1
          fi
          echo "JAVA_VERSION=$JAVA_VERSION" >> "$GITHUB_ENV"

      - name: Setup Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Build the plugin using Gradle
        run: ./gradlew check buildPlugin

      - name: Verify change-notes are generated from CHANGELOG.md
        run: make check-change-notes

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: '${{ env.PLUGIN_ARTIFACT_NAME }}'
          path: '${{ env.DIST_FOLDER }}/'


  test_compatibility:
    name: Test plugin compatibility with IntelliJ Platform ${{ matrix.ide-version }}
    needs:
      - build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2  # Limit parallelization to avoid overwhelming runners
      matrix:
        ide-version:
          - 'ideaIC:2023.3'
          - 'ideaIC:2024.3'
          - 'ideaIU:2023.3'
          - 'ideaIU:2024.3'
          - 'ideaIU:2025.3'
          - 'ideaIU:2026.1'
          - 'ideaIU:2026.2'
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Read Java version from gradle.properties
        run: |
          JAVA_VERSION=$(grep '^javaVersion=' gradle.properties | cut -d'=' -f2)
          if ! [[ "$JAVA_VERSION" =~ ^[0-9]+$ ]]; then
            echo "::error::Invalid Java version: $JAVA_VERSION"
            exit 1
          fi
          echo "JAVA_VERSION=$JAVA_VERSION" >> "$GITHUB_ENV"

      - name: Setup Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Download built plugin artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.PLUGIN_ARTIFACT_NAME }}
          path: ${{ env.DIST_FOLDER }}

      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf "$RUNNER_TOOL_CACHE"
          echo "Disk space after cleanup:"
          df -h

      - name: Verify Plugin on IntelliJ Platform ${{ matrix.ide-version }}
        id: verify
        uses: ChrisCarini/intellij-platform-plugin-verifier-action@18a458f197299bbe26b125d98aed48df90857439 # v2.0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          ide-versions: ${{ matrix.ide-version }}
          plugin-location: '${{ env.DIST_FOLDER }}/*.zip'

      - name: Get log file path and print contents
        run: |
          echo "The verifier log file [${{steps.verify.outputs.verification-output-log-filename}}] contents : " ;
          cat ${{steps.verify.outputs.verification-output-log-filename}}